name: Create agent cli

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag name
        required: true
        type: string
        default: 'main'
      version:
        description: Version
        required: true
        type: string
        default: '18.0.0'

jobs:
  build-and-publish:
    name: Package agent cli and publish
    runs-on: ubuntu-latest
    steps:
      - name: Echo inputs
        run: |
          echo "Pre-release branch: [${{ inputs.branch }}]"
          echo "Target version: [${{ inputs.version }}]"
      - name: Check out the repo
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch }}
      - name: Setup python
        uses: actions/setup-python@v3
        with:
          python-version: '3.12'
          architecture: 'x64'
      - name: Setup poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
      - name: Change version [watchmen-agent-cli]
        uses: ./.github/actions/change-poetry-version/
        id: change-poetry-version-utilities
        with:
          module-name: watchmen-agent-cli
          target-version: ${{ inputs.version }}
      - name: Package [watchmen-agent-cli] and publish to Pypi
        working-directory: ./packages/watchmen-agent-cli
        run: |
          poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}
          poetry publish --build