[tool.poetry]
name = "watchmen-agent-runtime-cli"
version = "18.0.0"
description = "Watchmen runtime metric query CLI"
authors = ["imma-team"]
packages = [
    { include = "agent_runtime_cli", from = "src" }
]

[tool.poetry.dependencies]
python = "^3.12"
requests = "^2.32.3"

[tool.poetry.scripts]
agent-runtime-cli = "agent_runtime_cli.main:run"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
