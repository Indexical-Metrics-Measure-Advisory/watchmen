[tool.poetry]
name = "watchmen-pii-classification"
version = "18.0.0"
description = "PII data classification platform — business-term driven sensitive-data discovery and lineage impact analysis."
authors = ["luke0623 <luke0623@outlook.com>"]
license = "MIT"
packages = [
	{ include = "watchmen_pii", from = "src" }
]

[tool.poetry.dependencies]
python = "~3.12"
pydantic = "^2.9.2"
pydantic-settings = "^2.4.0"
python-json-logger = "^2.0.7"
fastapi = ">=0.110"
starlette = ">=0.36"
PyYAML = "^6.0"
openpyxl = "^3.1"
watchmen-utilities = { path = "../watchmen-utilities", develop = true }
watchmen-model = { path = "../watchmen-model", develop = true }
watchmen-auth = { path = "../watchmen-auth", develop = true }
watchmen-storage = { path = "../watchmen-storage", develop = true }
watchmen-meta = { path = "../watchmen-meta", develop = true }
watchmen-rest = { path = "../watchmen-rest", develop = true }
watchmen-metricflow = { path = "../watchmen-metricflow", develop = true }
watchmen-search = { path = "../watchmen-search", develop = true }

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-asyncio = "^0.23.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
